<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="title_quiz">Karyera testi — Studygid</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body class="page-quiz">
  {% include 'partials/nav.html' %}

  <main class="quiz-main wrap">
    <header class="quiz-head">
      <h1 data-i18n="quiz_h1">Karyerani kashf etish testi</h1>
      <p class="section-sub" data-i18n="quiz_sub">Oltita savol. O'zingizga eng yaqinini tanlang — noto'g'ri javob yo'q.</p>
      <div class="quiz-progress" aria-hidden="true">
        <div class="quiz-progress-bar" id="quiz-progress-bar"></div>
      </div>
      <p class="quiz-step-label"><span id="quiz-step-num">1</span> / 6</p>
    </header>

    <div class="quiz-card glass" id="quiz-container">
      <div id="quiz-questions"></div>
      <div class="quiz-actions">
        <button type="button" class="btn btn-ghost" id="quiz-back" hidden data-i18n="quiz_back">Orqaga</button>
        <button type="button" class="btn btn-primary" id="quiz-next" data-i18n="quiz_next">Keyingisi</button>
      </div>
    </div>

    <section class="quiz-result glass hidden" id="quiz-result" aria-live="polite">
      <h2 data-i18n="quiz_res_h2">Kelajakdagi kasbingiz (qisqa tasvir)</h2>
      <p class="result-profession" id="result-profession"></p>
      <p class="result-note" id="result-note"></p>
      <a href="{{ url_for('index') }}" class="btn btn-ghost" data-i18n="quiz_home">Bosh sahifaga</a>
    </section>
  </main>

  {% include 'partials/footer.html' %}

  <div class="modal" id="auth-modal" aria-hidden="true">
    <div class="modal-backdrop" data-close-auth></div>
    <div class="modal-panel glass" role="dialog" aria-labelledby="auth-title">
      <button type="button" class="modal-close" data-close-auth aria-label="Yopish">×</button>
      <h2 id="auth-title">Xush kelibsiz</h2>
      <div class="auth-tabs">
        <button type="button" class="tab active" data-tab="login">Kirish</button>
        <button type="button" class="tab" data-tab="signup">Ro'yxatdan o'tish</button>
      </div>
      <form class="auth-form" id="form-login">
        <label class="field"><span>Elektron pochta</span><input type="email" name="email" required /></label>
        <label class="field"><span>Parol</span><input type="password" name="password" required /></label>
        <button type="submit" class="btn btn-primary btn-block">Kirish</button>
        <p class="form-status" id="login-status"></p>
      </form>
      <form class="auth-form hidden" id="form-signup">
        <label class="field"><span>Ism</span><input type="text" name="name" required /></label>
        <label class="field"><span>Elektron pochta</span><input type="email" name="email" required /></label>
        <label class="field"><span>Parol</span><input type="password" name="password" required /></label>
        <button type="submit" class="btn btn-primary btn-block">Hisob yaratish</button>
        <p class="form-status" id="signup-status"></p>
      </form>
    </div>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
